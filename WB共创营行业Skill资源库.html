<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WB 共创营 · 行业 Skill 资源库</title>
<style>
  :root {
    --brand: #1A54D6;
    --brand-light: #EAF0FF;
    --brand-dark: #0F35A0;
    --brand-soft: #DCE8FF;
    --accent: #00B896;
    --accent-light: #E0FAF5;
    --warn: #FF6B35;
    --warn-light: #FFF0EB;
    --violet: #5B5BD6;
    --violet-light: #ECEBFF;
    --sky: #2E7BF0;
    --neutral-900: #0F1A2E;
    --neutral-700: #374151;
    --neutral-500: #6B7280;
    --neutral-300: #D1D5DB;
    --neutral-200: #E5E7EB;
    --neutral-100: #F3F4F6;
    --neutral-50: #F9FAFB;
    --white: #FFFFFF;
    --shadow-sm: 0 1px 3px rgba(0,0,0,.07);
    --shadow-md: 0 12px 36px rgba(15,26,46,.10);
    --shadow-lg: 0 18px 48px rgba(15,26,46,.14);
    --r-sm: 8px;
    --r-md: 12px;
    --r-lg: 16px;
    --r-xl: 24px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
    background: var(--neutral-50);
    color: var(--neutral-700);
    line-height: 1.7;
  }
  a { color: inherit; }

  .page {
    min-height: 100vh;
    background:
      radial-gradient(circle at top right, rgba(46,123,240,.16), transparent 24%),
      radial-gradient(circle at top left, rgba(0,184,150,.10), transparent 20%),
      linear-gradient(180deg, #F5F9FF 0%, #F9FAFB 240px, #F9FAFB 100%);
  }
  .container {
    width: min(1120px, calc(100% - 32px));
    margin: 0 auto;
    padding-bottom: 72px;
  }

  .hero {
    padding: 40px 0 28px;
  }
  .hero-card {
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, #0A2880 0%, #1A54D6 50%, #2E7BF0 100%);
    color: #fff;
    border-radius: 0 0 28px 28px;
    padding: 44px 34px 34px;
    box-shadow: var(--shadow-lg);
  }
  .hero-card::after {
    content: "";
    position: absolute;
    right: -72px;
    top: -72px;
    width: 320px;
    height: 320px;
    border-radius: 50%;
    background: rgba(255,255,255,.06);
  }
  .hero-card::before {
    content: "";
    position: absolute;
    left: 44%;
    bottom: -92px;
    width: 280px;
    height: 280px;
    border-radius: 50%;
    background: rgba(255,255,255,.08);
    filter: blur(8px);
  }
  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 18px;
    padding: 4px 14px;
    border-radius: 999px;
    background: rgba(255,255,255,.14);
    border: 1px solid rgba(255,255,255,.24);
    font-size: 12px;
    letter-spacing: .4px;
  }
  .hero h1 {
    font-size: clamp(28px, 4vw, 42px);
    line-height: 1.2;
    margin-bottom: 12px;
    font-weight: 800;
  }
  .hero p {
    max-width: 760px;
    color: rgba(255,255,255,.84);
    font-size: 15px;
    margin-bottom: 24px;
  }
  .hero-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .hero-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border-radius: 999px;
    padding: 5px 14px;
    border: 1px solid rgba(255,255,255,.2);
    background: rgba(255,255,255,.12);
    font-size: 12px;
  }

  .overview {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
    margin-top: -18px;
  }
  .metric {
    position: relative;
    overflow: hidden;
    background: linear-gradient(180deg, rgba(255,255,255,.98), rgba(250,252,255,.96));
    border: 1px solid rgba(229,231,235,.85);
    border-radius: 18px;
    box-shadow: var(--shadow-sm);
    padding: 20px 22px;
  }
  .metric::after {
    content: "";
    position: absolute;
    right: -18px;
    top: -18px;
    width: 88px;
    height: 88px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(26,84,214,.12), rgba(26,84,214,0));
  }
  .metric-label {
    display: block;
    font-size: 12px;
    color: var(--neutral-500);
    margin-bottom: 6px;
  }
  .metric-value {
    font-size: 28px;
    line-height: 1;
    color: var(--neutral-900);
    font-weight: 800;
  }
  .metric-note {
    font-size: 12px;
    color: var(--neutral-500);
    margin-top: 8px;
  }

  .toolbar {
    margin-top: 28px;
    background: rgba(255,255,255,.82);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(229,231,235,.9);
    border-radius: 20px;
    box-shadow: var(--shadow-sm);
    padding: 22px 22px 18px;
  }
  .toolbar-top {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    align-items: flex-start;
    margin-bottom: 16px;
  }
  .toolbar h2 {
    color: var(--neutral-900);
    font-size: 18px;
    margin-bottom: 4px;
  }
  .toolbar p,
  .toolbar-meta {
    font-size: 13px;
    color: var(--neutral-500);
  }
  .filter-group {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .filter-chip {
    border: 1px solid rgba(209,213,219,.9);
    background: rgba(249,250,251,.92);
    color: var(--neutral-700);
    border-radius: 999px;
    padding: 10px 15px;
    font-size: 13px;
    line-height: 1;
    cursor: pointer;
    transition: all .18s ease;
  }
  .filter-chip:hover {
    border-color: var(--brand);
    color: var(--brand);
    transform: translateY(-1px);
  }
  .filter-chip.active {
    background: linear-gradient(180deg, #F2F6FF 0%, #EAF0FF 100%);
    border-color: var(--brand);
    color: var(--brand-dark);
    font-weight: 700;
    box-shadow: inset 0 0 0 1px rgba(26,84,214,.10);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 16px;
    margin-top: 18px;
  }
  .card {
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 16px;
    background: linear-gradient(180deg, rgba(255,255,255,.98), rgba(248,250,255,.98));
    border: 1px solid rgba(229,231,235,.92);
    border-radius: 20px;
    box-shadow: var(--shadow-sm);
    padding: 22px 22px 20px;
  }
  .card::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    height: 5px;
    background: linear-gradient(90deg, var(--brand) 0%, var(--sky) 100%);
  }
  .card::after {
    content: "";
    position: absolute;
    right: -26px;
    bottom: -26px;
    width: 130px;
    height: 130px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(26,84,214,.08), rgba(26,84,214,0));
    pointer-events: none;
  }
  .card:hover {
    box-shadow: var(--shadow-md);
    transform: translateY(-3px);
    transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    border-color: rgba(26,84,214,.18);
  }
  .card.category-项目管理::before { background: linear-gradient(90deg, #00B896 0%, #29D3B0 100%); }
  .card.category-视频制作::before { background: linear-gradient(90deg, #5B5BD6 0%, #8A7DFF 100%); }
  .card.category-内容审核::before { background: linear-gradient(90deg, #FF6B35 0%, #FF9C72 100%); }
  .card.category-内容创作::before { background: linear-gradient(90deg, #1A54D6 0%, #2E7BF0 100%); }
  .card-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 5px 10px;
    border-radius: 999px;
    background: rgba(15,26,46,.04);
    color: var(--neutral-500);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .4px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .card-icon {
    width: 40px;
    height: 40px;
    border-radius: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    background: var(--brand-light);
    box-shadow: inset 0 0 0 1px rgba(26,84,214,.07);
  }
  .card-top {
    display: flex;
    align-items: flex-start;
    gap: 16px;
  }
  .card-head {
    flex: 1;
  }
  .card-title {
    font-size: 18px;
    line-height: 1.35;
    color: var(--neutral-900);
    font-weight: 800;
    margin-bottom: 10px;
  }
  .tag-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .tag {
    display: inline-flex;
    align-items: center;
    border-radius: 999px;
    padding: 5px 10px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .2px;
  }
  .tag-blue { background: linear-gradient(180deg, #F1F5FF 0%, #EAF0FF 100%); color: var(--brand-dark); }
  .tag-green { background: linear-gradient(180deg, #ECFBF7 0%, #E0FAF5 100%); color: #0F6E56; }
  .tag-orange { background: var(--warn-light); color: #B45309; }
  .summary-panel {
    background: linear-gradient(180deg, rgba(234,240,255,.62), rgba(249,250,251,.84));
    border: 1px solid rgba(229,231,235,.92);
    border-radius: 16px;
    padding: 14px 15px;
  }
  .summary {
    color: var(--neutral-700);
    font-size: 14px;
  }
  .meta-grid {
    display: none;
  }
  .cta-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding-top: 4px;
    border-top: 1px solid rgba(229,231,235,.9);
  }
  .card-footnote {
    font-size: 12px;
    color: var(--neutral-500);
  }
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 128px;
    border-radius: 999px;
    padding: 10px 18px;
    text-decoration: none;
    font-size: 13px;
    font-weight: 700;
    border: 1px solid var(--brand);
    background: linear-gradient(135deg, #1A54D6 0%, #2E7BF0 100%);
    color: #fff;
    box-shadow: 0 8px 18px rgba(26,84,214,.20);
    transition: transform .18s ease, box-shadow .18s ease;
  }
  .btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 12px 24px rgba(26,84,214,.26);
  }
  .btn.disabled {
    border-color: var(--neutral-200);
    background: var(--neutral-100);
    color: var(--neutral-500);
    cursor: not-allowed;
  }

  .empty {
    display: none;
    margin-top: 18px;
    padding: 32px 28px;
    border-radius: 20px;
    background: linear-gradient(180deg, rgba(255,255,255,.98), rgba(249,250,251,.96));
    border: 1px dashed var(--neutral-300);
    color: var(--neutral-500);
    text-align: center;
  }
  .footer {
    text-align: center;
    margin-top: 28px;
    color: #9CA3AF;
    font-size: 12px;
  }

  @media (max-width: 960px) {
    .overview { grid-template-columns: repeat(2, 1fr); }
    .grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 640px) {
    .container { width: min(100% - 24px, 1120px); }
    .hero-card { padding: 34px 20px 26px; border-radius: 0 0 18px 18px; }
    .overview { grid-template-columns: 1fr; margin-top: 14px; }
    .toolbar-top { flex-direction: column; }
    .meta-grid { grid-template-columns: 1fr; }
    .cta-row { flex-direction: column; align-items: flex-start; }
    .btn { width: 100%; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="container">
    <section class="hero">
      <div class="hero-card">
        <div class="eyebrow">TENCENT CLOUD × WORKBUDDY</div>
        <h1>行业 Skill 资源库</h1>
        <p>沉淀共创营后续产出的行业 Skills，按场景标签快速筛选，集中查看每个 Skill 的适用岗位、能力说明与后续下载入口。</p>
        <div class="hero-chips" id="hero-chips"></div>
      </div>
    </section>

    <section class="overview" id="overview"></section>

    <section class="toolbar">
      <div class="toolbar-top">
        <div>
          <h2>按场景标签筛选</h2>
          <p>按不同工作场景快速筛选，直接查看对应 Skill 的能力说明与使用入口。</p>
        </div>
        <div class="toolbar-meta" id="toolbar-meta"></div>
      </div>
      <div class="filter-group" id="filters"></div>
    </section>

    <section class="grid" id="skills-grid"></section>
    <section class="empty" id="empty-state">当前筛选条件下还没有可展示的 Skill。</section>

    <div class="footer">腾讯云文化传媒行业线 × WorkBuddy · 2026</div>
  </div>
</div>

<script src="data/skills-data.js"></script>
<script>
  const data = window.SKILL_DATA || { meta: {}, items: [] };
  const state = { activeCategory: "全部" };

  const heroChips = document.getElementById("hero-chips");
  const overview = document.getElementById("overview");
  const filters = document.getElementById("filters");
  const grid = document.getElementById("skills-grid");
  const emptyState = document.getElementById("empty-state");
  const toolbarMeta = document.getElementById("toolbar-meta");

  function makeChip(text) {
    const chip = document.createElement("span");
    chip.className = "hero-chip";
    chip.textContent = text;
    return chip;
  }

  function renderHero() {
    const chips = [
      `${data.meta.totalSkills || 0} 个 Skill`,
      `${(data.meta.categories || []).length} 类场景`
    ];
    chips.forEach((item) => heroChips.appendChild(makeChip(item)));
  }

  function metric(label, value, note) {
    return `
      <div class="metric">
        <span class="metric-label">${label}</span>
        <div class="metric-value">${value}</div>
        <div class="metric-note">${note}</div>
      </div>
    `;
  }

  function renderOverview() {
    overview.innerHTML = [
      metric("Skill 总数", data.meta.totalSkills || 0, "可直接查看与使用的能力入口"),
      metric("场景标签", (data.meta.categories || []).length, "按行业工作流快速筛选")
    ].join("");
  }

  function renderFilters() {
    const categories = ["全部", ...(data.meta.categories || [])];
    filters.innerHTML = "";
    categories.forEach((category) => {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "filter-chip" + (state.activeCategory === category ? " active" : "");
      const count = category === "全部"
        ? data.items.length
        : data.items.filter((item) => item.category === category).length;
      button.textContent = `${category} · ${count}`;
      button.addEventListener("click", () => {
        state.activeCategory = category;
        renderFilters();
        renderGrid();
      });
      filters.appendChild(button);
    });
  }

  function priorityTag(text, tone) {
    return `<span class="tag ${tone}">${text}</span>`;
  }

  function getCategoryIcon(category) {
    const icons = {
      "内容创作": "✍",
      "内容审核": "✓",
      "视频制作": "🎬",
      "项目管理": "🗂"
    };
    return icons[category] || "✦";
  }

  function getCategoryFootnote(category) {
    const notes = {
      "内容创作": "适合内容生产与多平台改写场景",
      "内容审核": "适合质量把关与风险审校场景",
      "视频制作": "适合视频生产与后期流程场景",
      "项目管理": "适合协同管理与流程推进场景"
    };
    return notes[category] || "适合工作流标准化与复用沉淀";
  }

  function inferRoleTags(item) {
    const text = `${item.name || ""} ${item.summary || ""}`.toLowerCase();
    const tags = [];
    const category = item.category || "";

    function add(tag) {
      if (tag && tag !== category && !tags.includes(tag)) {
        tags.push(tag);
      }
    }

    if (item.category === "项目管理") {
      add("项目经理");
      add("运营经理");
    }

    if (item.category === "内容创作") {
      add("编辑");
      add("新媒体运营");
    }

    if (item.category === "内容审核") {
      add("审核专员");
      add("编辑");
    }

    if (item.category === "视频制作") {
      add("编导");
      add("剪辑师");
    }

    if (text.includes("公众号") || text.includes("文案") || text.includes("新闻") || text.includes("科普")) {
      add("内容编辑");
    }
    if (text.includes("排版") || text.includes("indesign")) {
      add("排版编辑");
    }
    if (text.includes("读者来信") || text.includes("社交评论") || text.includes("回复")) {
      add("社群运营");
    }
    if (text.includes("截稿") || text.includes("进展追踪") || text.includes("规划")) {
      add("项目管理");
    }
    if (text.includes("审核") || text.includes("审校") || text.includes("错别字") || text.includes("事实核查")) {
      add("内容审核");
    }
    if (text.includes("字幕") || text.includes("短视频") || text.includes("烧录")) {
      add("视频后期");
    }
    if (text.includes("漫剧") || text.includes("分镜") || text.includes("剧本")) {
      add("编剧");
    }
    if (text.includes("选题") || text.includes("调研")) {
      add("选题策划");
    }
    if (text.includes("ppt") || text.includes("演讲")) {
      add("培训经理");
    }

    return tags.slice(0, 3);
  }

  function renderCard(item) {
    const button = item.downloadUrl
      ? `<a class="btn" href="${item.downloadUrl}" target="_blank" rel="noopener noreferrer">查看入口</a>`
      : `<span class="btn disabled">链接待补充</span>`;
    const roleTags = inferRoleTags(item)
      .map((tag) => priorityTag(tag, "tag-green"))
      .join("");
    const categoryClass = `category-${item.category || "default"}`;
    const categoryIcon = getCategoryIcon(item.category);
    const footnote = getCategoryFootnote(item.category);

    return `
      <article class="card ${categoryClass}">
        <div class="card-top">
          <div class="card-icon">${categoryIcon}</div>
          <div class="card-head">
            <div class="card-badge">Skill #${item.order}</div>
            <h3 class="card-title">${item.name}</h3>
            <div class="tag-row">
              ${priorityTag(item.category, "tag-blue")}
              ${roleTags}
            </div>
          </div>
        </div>
        <div class="summary-panel">
          <p class="summary">${item.summary}</p>
        </div>
        <div class="cta-row">
          <div class="card-footnote">${footnote}</div>
          ${button}
        </div>
      </article>
    `;
  }

  function renderGrid() {
    const visibleItems = state.activeCategory === "全部"
      ? data.items
      : data.items.filter((item) => item.category === state.activeCategory);

    toolbarMeta.textContent = `最近同步：${data.meta.generatedAt || "未标注"} · 当前展示 ${visibleItems.length} 项`;

    if (!visibleItems.length) {
      grid.innerHTML = "";
      emptyState.style.display = "block";
      return;
    }

    emptyState.style.display = "none";
    grid.innerHTML = visibleItems
      .sort((a, b) => a.order - b.order)
      .map(renderCard)
      .join("");
  }

  renderHero();
  renderOverview();
  renderFilters();
  renderGrid();
</script>
</body>
</html>
